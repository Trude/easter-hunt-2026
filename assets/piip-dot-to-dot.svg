      200,102
      240,110
      268,135
      278,158
      302,168
      278,180
      260,202
      255,232
      282,262
      308,292
      288,328
      265,355
      258,378
      260,410
      278,425
      248,432
      225,425
      210,412
      190,425
      162,432
      138,425
      140,410
      140,378
      118,335
      98,295
      120,258
      145,232
      142,200
      155,145
